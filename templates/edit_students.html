<form action="/update_student/{{student.student_id}}"method="POST">
  <div>
    <label for="first_name">First Name:</label>
  </div>
    <input
    type="text"
    name="first_name"
    value="{{ student.first_name }}"
    class="form-control"
    >
  <div>
    <label for="last_name">Last Name:</label>
  </div>
    <input
    type="text"
    name="last_name"
    value="{{ student.last_name }}"
    class="form-control"
    >
    <button type="submit">
     update student
</button>
</form>
