{% extends 'layout.html' %}
{% block content %}

<h2>Add Student</h2>
<form action="/add_student/" method="POST">

        <div class="row mt-4">
            <div class="col-md-6">
               <label class="form-label">
                first Name
               </label> 
               <input
                type="text"
                name="first_name"  
                class="form-control"   
                required>
            </div>
        </div class="col-md-6">
        <label class="form-label">
            last Name       
        </label>
        <input
            type="text"
            name="last_name"  
            class="form-control"   
            required>
        </div>
       <div class="row mt-3">
        <div class="col-md-4">
            gender
        </label>
        <select
            name="gender"
            class="form-control"
            required
        >
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        </div>       
        <div class="col-md-4">
            <label class="form-label">
                mobile number
            </label>
            <input
                type="text"
                name="mobile_number"  
                class="form-control"   
                required>
        </div>
        <div class="col-md-4">
            <label class="form-label">
                course name
            </label>
            <input
                type="text"
                name="course_name"  
                class="form-control"   
                required>
        </div>
         </div>
    <div class="row mt-3">
        <div class="col-md-12">
            <label class="form-label">
                 email
            </label>
            <input
                type="email"
                name="email"  
                class="form-control"   
                required>
    </div>
    
</div>
    
<button type="submit" class="btn btn-primary mt-4">
        save student
    </button>
</form>
{% endblock %}
